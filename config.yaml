# HermitClaw Configuration
provider: "custom"
model: "glm-4-air"
api_key: null
base_url: "https://api.z.ai/api/coding/paas/v4"

# Bedrock configuration (optional, for bedrock provider)
# aws_region: "us-east-1"

thinking_pace_seconds: 5
max_thoughts_in_context: 4

# Memory stream settings
reflection_threshold: 50
memory_retrieval_count: 3
embedding_model: "text-embedding-3-small"
recency_decay_rate: 0.995

# Web search provider
web_search:
  provider: "searxng"
  searxng_url: "http://localhost:9091/"
